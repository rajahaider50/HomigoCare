name: homigo_care
description: Homigo Care - Healthcare App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  firebase_database: ^10.4.0
  google_sign_in: ^6.2.1
  provider: ^6.1.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.2
  flutter_local_notifications: ^16.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  uuid: ^4.2.1
  permission_handler: ^11.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
