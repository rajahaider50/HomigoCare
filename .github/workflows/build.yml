name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate Flutter project
        run: flutter create . --org com.homigocare --project-name homigo_care --platforms android

      - name: Set minSdk to 21
        run: |
          python3 -c "
          import re
          content = open('android/app/build.gradle').read()
          content = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 21', content)
          open('android/app/build.gradle', 'w').write(content)
          print('Done: minSdk set to 21')
          "

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homigo-care-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
