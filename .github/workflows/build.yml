name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate Flutter project
        run: flutter create . --org com.homigocare --project-name homigo_care --platforms android

      - name: Configure Android project
        run: |
          # Write project-level build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.10'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # Write app-level build.gradle
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }

          android {
              namespace "com.homigocare.app"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.homigocare.app"
                  minSdk 21
                  targetSdk flutter.targetSdkVersion
                  versionCode flutter.versionCode
                  versionName flutter.versionName
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {}
          EOF

          # Restore google-services.json
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "90367474956",
              "firebase_url": "https://homigo-care-8360e-default-rtdb.firebaseio.com",
              "project_id": "homigo-care-8360e",
              "storage_bucket": "homigo-care-8360e.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:90367474956:android:47f75be6fc8d327b729d29",
                  "android_client_info": {
                    "package_name": "com.homigocare.app"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "90367474956-agoqpqvs68fgn778kli79a6js93rirm9.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "AIzaSyBmTL1zlv1M4FsnRkDZQqe9LzTqQlulEQY"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [
                      {
                        "client_id": "90367474956-agoqpqvs68fgn778kli79a6js93rirm9.apps.googleusercontent.com",
                        "client_type": 3
                      }
                    ]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSJSON

          # Fix settings.gradle for older Flutter
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "com.android.application"/id "com.android.application" version "7.4.2"/' android/settings.gradle 2>/dev/null || true
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homigo-care-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
